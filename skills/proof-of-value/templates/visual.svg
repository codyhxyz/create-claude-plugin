<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="{{bg}}"/>
  <rect x="0" y="0" width="14" height="900" fill="{{accent}}"/>

  <text x="80" y="90" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" font-weight="600" letter-spacing="1.5" fill="{{accent}}">PROOF · BEFORE / AFTER</text>

  <!-- Image panels -->
  <rect x="80"  y="130" width="700" height="640" rx="14" ry="14" fill="{{panelBg}}" stroke="{{panelStroke}}" stroke-width="1"/>
  <image x="90"  y="140" width="680" height="620" href="{{beforeImageHref}}" preserveAspectRatio="xMidYMid meet"/>
  <rect x="820" y="130" width="700" height="640" rx="14" ry="14" fill="{{panelBg}}" stroke="{{panelStroke}}" stroke-width="1"/>
  <image x="830" y="140" width="680" height="620" href="{{afterImageHref}}" preserveAspectRatio="xMidYMid meet"/>

  <!-- Pill labels -->
  <rect x="110" y="150" width="140" height="40" rx="20" ry="20" fill="{{muted}}" fill-opacity="0.9"/>
  <text x="180" y="178" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="{{bg}}" text-anchor="middle">{{beforeLabel}}</text>
  <rect x="850" y="150" width="140" height="40" rx="20" ry="20" fill="{{accent}}"/>
  <text x="920" y="178" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#FFFFFF" text-anchor="middle">{{afterLabel}}</text>

  <line x1="80" y1="820" x2="1520" y2="820" stroke="{{muted}}" stroke-opacity="0.18" stroke-width="1"/>
  <text x="80"   y="860" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="{{fg}}">{{name}}</text>
  <text x="1520" y="860" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="{{muted}}" text-anchor="end">{{caption}}</text>
</svg>
