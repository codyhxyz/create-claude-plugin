<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="{{bg}}"/>
  <rect x="0" y="0" width="14" height="900" fill="{{accent}}"/>

  <text x="80" y="90" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" font-weight="600" letter-spacing="1.5" fill="{{accent}}">PROOF · TERMINAL DIFF</text>

  <!-- Left panel: BEFORE -->
  <rect x="80"  y="140" width="700" height="640" rx="14" ry="14" fill="{{panelBg}}" stroke="{{panelStroke}}" stroke-width="1"/>
  <rect x="80"  y="140" width="700" height="56"  rx="14" ry="14" fill="{{panelHeader}}"/>
  <rect x="80"  y="178" width="700" height="18"  fill="{{panelHeader}}"/>
  <text x="110" y="178" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="{{muted}}">{{beforeLabel}}</text>
  <rect x="108" y="150" width="14" height="14" rx="7" ry="7" fill="#E06C75"/>
  <rect x="138" y="150" width="14" height="14" rx="7" ry="7" fill="#E5C07B"/>
  <rect x="168" y="150" width="14" height="14" rx="7" ry="7" fill="#98C379"/>
  <text x="110" y="240" font-family="JetBrains Mono, Menlo, Consolas, 'Courier New', monospace" font-size="22" fill="{{codeFg}}">{{{beforeTspans}}}</text>

  <!-- Right panel: AFTER -->
  <rect x="820" y="140" width="700" height="640" rx="14" ry="14" fill="{{panelBg}}" stroke="{{panelStroke}}" stroke-width="1"/>
  <rect x="820" y="140" width="700" height="56"  rx="14" ry="14" fill="{{panelHeader}}"/>
  <rect x="820" y="178" width="700" height="18"  fill="{{panelHeader}}"/>
  <text x="850" y="178" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="{{accent}}">{{afterLabel}}</text>
  <rect x="848" y="150" width="14" height="14" rx="7" ry="7" fill="#E06C75"/>
  <rect x="878" y="150" width="14" height="14" rx="7" ry="7" fill="#E5C07B"/>
  <rect x="908" y="150" width="14" height="14" rx="7" ry="7" fill="#98C379"/>
  <text x="850" y="240" font-family="JetBrains Mono, Menlo, Consolas, 'Courier New', monospace" font-size="22" fill="{{codeFg}}">{{{afterTspans}}}</text>

  <!-- Footer -->
  <line x1="80" y1="820" x2="1520" y2="820" stroke="{{muted}}" stroke-opacity="0.18" stroke-width="1"/>
  <text x="80"   y="860" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="{{fg}}">{{name}}</text>
  <text x="1520" y="860" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="{{muted}}" text-anchor="end">{{caption}}</text>
</svg>
